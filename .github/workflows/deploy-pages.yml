# Manual GitHub Pages deploy workflow.
#
# This file does NOT trigger automatically — `workflow_dispatch` means it
# only runs when a maintainer clicks "Run workflow" on the Actions tab.
# That keeps the repo from auto-publishing while the workflow exists for
# anyone who wants to enable Pages later.
#
# Before enabling: in the repo's Settings → Pages, set the source to
# "GitHub Actions". Vite's `base` would also need updating in
# `vite.config.ts` if the repo isn't served from the root path.

name: Deploy to GitHub Pages (manual)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
