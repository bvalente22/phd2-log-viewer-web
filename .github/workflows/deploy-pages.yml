# Deploy the web app to GitHub Pages.
#
# Auto-runs on every push to `main` AND can be triggered manually
# from the Actions tab. The web project lives under `web/`, so each
# step that needs the project sets `working-directory: web` and the
# Pages artifact picks `web/dist` as its source.
#
# One-time setup the first time this lands on main:
#   1. Repo Settings → Pages → "Source" = GitHub Actions.
#   2. After the first successful run, the live URL appears at
#      https://<owner>.github.io/<repo>/  — for this repo:
#      https://bvalente22.github.io/phd2-log-viewer-web/
# The Vite base path is set in `web/vite.config.ts` to match.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy can run at a time; cancel-in-progress=false
# means a second push queues rather than aborting the in-flight build,
# so we don't end up publishing an inconsistent partial bundle.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
